<html lang="en">

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aura Farming</title>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>

    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        gold: {
                            400: '#fbbf24',

                            600: '#d97706',
                        }
                    }
                }
            }
        }
    </script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-black text-gray-100 antialiased overflow-x-hidden selection:bg-gold-500 selection:text-black">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Gemini API configuration
        const apiKey = ""; 
        const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent`;

        // Icons using inline SVG for maximum compatibility
        const CopyIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>
        );
        const CheckIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#10b981" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        );
        const SparklesIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>
        );
        const SearchIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        );

        // Fetch with exponential backoff
        async function fetchWithRetry(url, options, retries = 5) {
            const delays = [1000, 2000, 4000, 8000, 16000];
            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(url, options);
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    return await response.json();
                } catch (error) {
                    if (i === retries - 1) throw error;
                    await new Promise(res => setTimeout(res, delays[i]));
                }
            }
        }

        function App() {
            const [message, setMessage] = useState("");
            const [vibe, setVibe] = useState("Balanced");
            const [replies, setReplies] = useState([]);
            const [decodeResult, setDecodeResult] = useState("");
            const [isFarming, setIsFarming] = useState(false);
            const [isDecoding, setIsDecoding] = useState(false);
            const [error, setError] = useState("");
            const [copiedIndex, setCopiedIndex] = useState(null);

            const handleCopy = (text, index) => {
                // Clipboard fallback for iframes/older browsers
                if (navigator.clipboard && window.isSecureContext) {
                    navigator.clipboard.writeText(text);
                } else {
                    let textArea = document.createElement("textarea");
                    textArea.value = text;
                    textArea.style.position = "fixed";
                    textArea.style.left = "-999999px";
                    textArea.style.top = "-999999px";
                    document.body.appendChild(textArea);
                    textArea.focus();
                    textArea.select();
                    try {
                        document.execCommand('copy');
                    } catch (error) {
                        console.error('Fallback copy failed', error);
                    }
                    textArea.remove();
                }
                
                setCopiedIndex(index);
                setTimeout(() => setCopiedIndex(null), 2000);
            };

            const farmAura = async () => {
                if (!message.trim()) {
                    setError("Bro, you gotta paste a message first.");
                    return;
                }
                
                setIsFarming(true);
                setError("");
                setReplies([]);
                setDecodeResult(""); // Clear decode when farming

                const prompt = `You are a modern dating and texting expert with immense 'rizz'. 
                Generate exactly 3 highly effective, engaging, and situational replies to the following message.
                The personality/vibe of the replies must be: ${vibe}.
                
                CRITICAL INSTRUCTION: Automatically detect if the input message is in English or Hinglish (Hindi written in the English alphabet). 
                You MUST write all 3 replies in the EXACT SAME LANGUAGE and slang as the input message.
                
                Message: "${message}"`;

                const payload = {
                    contents: [{ parts: [{ text: prompt }] }],
                    generationConfig: {
                        responseMimeType: "application/json",
                        responseSchema: {
                            type: "ARRAY",
                            items: { type: "STRING" },
                            description: "Array of exactly 3 reply strings"
                        }
                    }
                };

                try {
                    const result = await fetchWithRetry(`${API_URL}?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (result.candidates && result.candidates[0].content.parts[0].text) {
                        const parsedReplies = JSON.parse(result.candidates[0].content.parts[0].text);
                        setReplies(parsedReplies);
                    } else {
                        throw new Error("Invalid response from the aura generator.");
                    }
                } catch (err) {
                    setError("Failed to farm aura. The universe is busy right now.");
                } finally {
                    setIsFarming(false);
                }
            };

            const decodeIntent = async () => {
                if (!message.trim()) {
                    setError("Paste a message to decode.");
                    return;
                }

                setIsDecoding(true);
                setError("");
                setDecodeResult("");
                setReplies([]); // Clear replies when decoding

                const prompt = `Analyze the following text message. Decode the underlying intent, subtext, and psychology of the sender. 
                What do they actually mean? Keep the analysis concise (1-2 sentences), insightful, slightly witty, and brutally honest.
                Do not use markdown formatting. Detect if it's English or Hinglish and reply in the same language.
                
                Message: "${message}"`;

                const payload = {
                    contents: [{ parts: [{ text: prompt }] }]
                };

                try {
                    const result = await fetchWithRetry(`${API_URL}?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (result.candidates && result.candidates[0].content.parts[0].text) {
                        setDecodeResult(result.candidates[0].content.parts[0].text);
                    } else {
                        throw new Error("Invalid response.");
                    }
                } catch (err) {
                    setError("Failed to decode the vibe.");
                } finally {
                    setIsDecoding(false);
                }
            };

            return (
                <div className="min-h-screen flex flex-col items-center p-4 sm:p-8 bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-zinc-900 via-black to-black">
                    
                    {/* Header */}
                    <div className="w-full max-w-md mt-6 mb-8 text-center">
                        <h1 className="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-gold-400 to-yellow-600 tracking-tight flex items-center justify-center gap-2">
                            Aura Farming <SparklesIcon />
                        </h1>
                        <p className="text-zinc-500 mt-2 text-sm font-medium uppercase tracking-widest">Never leave them on read</p>
                    </div>

                    {/* Main Card */}
                    <div className="w-full max-w-md bg-zinc-900/50 backdrop-blur-md border border-zinc-800 rounded-3xl p-5 shadow-2xl">
                        
                        {/* Input Area */}
                        <div className="mb-5">
                            <label className="block text-zinc-400 text-xs font-semibold mb-2 uppercase tracking-wide">Their Message</label>
                            <textarea 
                                value={message}
                                onChange={(e) => setMessage(e.target.value)}
                                placeholder="Paste the text here..."
                                className="w-full bg-black border border-zinc-800 rounded-2xl p-4 text-white placeholder-zinc-600 focus:outline-none focus:border-gold-500 focus:ring-1 focus:ring-gold-500 transition-all resize-none min-h-[100px]"
                            />
                        </div>

                        {/* Vibe Selector */}
                        <div className="mb-6">
                            <label className="block text-zinc-400 text-xs font-semibold mb-2 uppercase tracking-wide">Select Vibe</label>
                            <div className="relative">
                                <select 
                                    value={vibe}
                                    onChange={(e) => setVibe(e.target.value)}
                                    className="w-full appearance-none bg-black border border-zinc-800 rounded-xl py-3 px-4 text-gold-400 font-medium focus:outline-none focus:border-gold-500 transition-all cursor-pointer"
                                >
                                    <option value="Balanced">⚖️ Balanced (Safe & Witty)</option>
                                    <option value="Spicy">🌶️ Spicy (Flirty & Bold)</option>
                                    <option value="Cold">🧊 Cold (Mysterious & Distant)</option>
                                    <option value="Poetic">🎭 Poetic (Deep & Expressive)</option>
                                </select>
                                <div className="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-zinc-500">
                                    <svg className="fill-current h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"><path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z"/></svg>
                                </div>
                            </div>
                        </div>

                        {/* Action Buttons */}
                        <div className="flex gap-3">
                            <button 
                                onClick={farmAura}
                                disabled={isFarming || isDecoding}
                                className="flex-1 bg-gradient-to-r from-gold-500 to-gold-600 hover:from-gold-400 hover:to-gold-500 text-black font-bold py-3 px-4 rounded-xl shadow-lg shadow-gold-500/20 transition-all active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed flex justify-center items-center gap-2"
                            >
                                {isFarming ? <span className="animate-pulse">Farming...</span> : <><SparklesIcon /> Farm Aura</>}
                            </button>
                            
                            <button 
                                onClick={decodeIntent}
                                disabled={isFarming || isDecoding}
                                className="flex-1 bg-transparent border-2 border-zinc-700 hover:border-gold-500 text-white font-semibold py-3 px-4 rounded-xl transition-all active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed flex justify-center items-center gap-2"
                            >
                                {isDecoding ? <span className="animate-pulse">Decoding...</span> : <><SearchIcon /> Decode</>}
                            </button>
                        </div>

                        {/* Error Message */}
                        {error && (
                            <div className="mt-4 p-3 bg-red-950/50 border border-red-900 rounded-xl text-red-400 text-sm text-center">
                                {error}
                            </div>
                        )}
                    </div>

                    {/* Results Area */}
                    <div className="w-full max-w-md mt-6 space-y-4 pb-12">
                        
                        {/* Decode Result */}
                        {decodeResult && (
                            <div className="bg-zinc-800/80 border border-zinc-700 rounded-2xl p-5 shadow-lg relative overflow-hidden">
                                <div className="absolute top-0 left-0 w-1 h-full bg-blue-500"></div>
                                <h3 className="text-blue-400 text-xs font-bold uppercase tracking-wider mb-2 flex items-center gap-2">
                                    <SearchIcon /> Subtext Analysis
                                </h3>
                                <p className="text-gray-200 text-sm leading-relaxed">{decodeResult}</p>
                            </div>
                        )}

                        {/* Rizz Replies */}
                        {replies.length > 0 && (
                            <h3 className="text-gold-500 text-sm font-bold uppercase tracking-wider pl-1 mt-4">Harvested Replies</h3>
                        )}
                        
                        {replies.map((reply, index) => (
                            <div key={index} className="bg-zinc-900 border border-zinc-800 rounded-2xl p-4 shadow-md hover:border-zinc-600 transition-colors group relative pr-14">
                                <p className="text-gray-200 text-sm sm:text-base pr-2">{reply}</p>
                                
                                <button 
                                    onClick={() => handleCopy(reply, index)}
                                    className="absolute right-3 top-1/2 -translate-y-1/2 p-2 rounded-lg bg-black border border-zinc-800 text-zinc-400 hover:text-gold-400 hover:border-gold-500 transition-all"
                                    title="Copy to clipboard"
                                >
                                    {copiedIndex === index ? <CheckIcon /> : <CopyIcon />}
                                </button>
                            </div>
                        ))}
                    </div>
                    
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
